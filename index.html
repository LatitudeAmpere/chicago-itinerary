<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chicago Trip</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #faf7f2;
  color: #222;
}

.section {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

.block {
  margin-bottom: 30px;
}

.block h2 {
  margin-bottom: 10px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  padding: 14px;
  border-radius: 12px;
  border: 2px solid #ddd;
  background: white;
  cursor: pointer;
  transition: all 0.2s ease;
}

.option:hover {
  border-color: #999;
}

.option.active {
  border-color: #ff6b81;
  transform: scale(1.02);
}

.option.dimmed {
  opacity: 0.35;
}
</style>
</head>

<body>

<div class="section">

  <h1>🌆 Chicago Trip — Monday</h1>

  <div class="block">
    <h2>☕ Morning</h2>

    <div class="options">
      <div class="option" onclick="selectOption(this)">
        Option A: Coffee + Bookstore in River North
      </div>

      <div class="option" onclick="selectOption(this)">
        Option B: Slow walk + small neighborhood café
      </div>

      <div class="option" onclick="selectOption(this)">
        Option C: Museum visit (Art Institute wing)
      </div>
    </div>
  </div>

</div>

<script>
function selectOption(el) {
  const container = el.parentElement;
  const options = container.querySelectorAll(".option");

  options.forEach(opt => {
    opt.classList.remove("active", "dimmed");
  });

  el.classList.add("active");

  options.forEach(opt => {
    if (opt !== el) {
      opt.classList.add("dimmed");
    }
  });
}
</script>

</body>
</html>
